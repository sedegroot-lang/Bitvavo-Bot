{% extends "base.html" %}

{% block title %}📊 Analyse - Bitvavo Trading Bot{% endblock %}

{% block content %}

<!-- Hero Stats Grid -->
<div class="hero-grid" id="analytics-hero-grid">
    <div class="hero-card">
        <div class="hero-label">💰 TOTALE W/V</div>
        <div class="hero-value" id="hero-an-pnl">-</div>
        <div class="hero-sub">Totaalresultaat</div>
    </div>
    <div class="hero-card">
        <div class="hero-label">🎯 WINSTPERCENTAGE</div>
        <div class="hero-value" id="hero-an-winrate">-</div>
        <div class="hero-sub">Succesratio</div>
    </div>
    <div class="hero-card">
        <div class="hero-label">📈 TRADES</div>
        <div class="hero-value" id="hero-an-trades">-</div>
        <div class="hero-sub">Totaal uitgevoerd</div>
    </div>
    <div class="hero-card">
        <div class="hero-label">📊 WINSTFACTOR</div>
        <div class="hero-value" id="hero-an-pf">-</div>
        <div class="hero-sub">Winst/verlies verhouding</div>
    </div>
</div>

<!-- Time Period Selector -->
<div class="glass-panel" style="margin: 1.5rem 0;">
    <div class="form-group-hodl">
        <label style="font-weight: 600;">📅 Tijdsperiode</label>
        <select id="period-selector" class="form-input" onchange="loadAnalyticsData()">
            <option value="all">Alle tijd</option>
            <option value="7">Laatste 7 dagen</option>
            <option value="30" selected>Laatste 30 dagen</option>
            <option value="90">Laatste 90 dagen</option>
        </select>
    </div>
</div>

<!-- Dynamic Content -->
<div id="analytics-content">
    <div class="loading-spinner">
        <div class="spinner"></div>
        <p>Analyse laden...</p>
    </div>
</div>

<style>
.metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin: 1.5rem 0;
}

.metric-card {
    background: rgba(20, 20, 35, 0.6);
    border: 1px solid rgba(0, 212, 170, 0.3);
    border-radius: 8px;
    padding: 1rem;
    text-align: center;
}

.metric-label {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
}

.metric-value {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--neon-cyan);
}

.metric-value.positive {
    color: #00d4aa;
}

.metric-value.negative {
    color: #ff6b6b;
}

.stats-table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
}

.stats-table th,
.stats-table td {
    padding: 0.75rem;
    text-align: left;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.stats-table th {
    font-weight: 600;
    color: var(--neon-blue);
    font-size: 0.9rem;
    cursor: pointer;
}

.stats-table th:hover {
    color: var(--neon-cyan);
}

.stats-table tbody tr:hover {
    background: rgba(0, 212, 255, 0.05);
}

.chart-container {
    position: relative;
    height: 400px;
    margin: 1.5rem 0;
}

.section-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.3), transparent);
    margin: 2.5rem 0;
}

/* Responsive */
@media (max-width: 1200px) {
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
    .metrics-grid { grid-template-columns: 1fr; }
}
</style>

<!-- Chart.js loaded globally via base.html -->
<script>
let analyticsData = null;
let dailyPnlChart = null;

async function loadAnalyticsData() {
    const period = document.getElementById('period-selector').value;
    
    try {
        // Load main analytics
        const analyticsResponse = await fetch(`/api/analytics/report?period=${period}`);
        if (!analyticsResponse.ok) throw new Error('Failed to fetch analytics');
        analyticsData = await analyticsResponse.json();
        
        // Load market stats
        const marketStatsResponse = await fetch(`/api/analytics/market_stats?period=${period}`);
        const marketStatsData = await marketStatsResponse.json();
        analyticsData.market_stats = marketStatsData.market_stats || [];
        
        // Load daily P/L
        const days = period === 'all' ? 365 : parseInt(period);
        const dailyPnlResponse = await fetch(`/api/analytics/daily_pnl?days=${days}`);
        const dailyPnlData = await dailyPnlResponse.json();
        analyticsData.daily_pnl = dailyPnlData.daily_pnl || [];
        
        renderAnalyticsContent(analyticsData);
    } catch (error) {
        console.error('Error loading analytics:', error);
        document.getElementById('analytics-content').innerHTML = `
            <div class="glass-panel">
                <div style="text-align: center; padding: 2rem; color: var(--danger);">
                    <h3>⚠️ Kon analytics niet laden</h3>
                    <p>${error.message}</p>
                    <button class="btn btn-secondary" onclick="loadAnalyticsData()">🔄 Opnieuw proberen</button>
                </div>
            </div>
        `;
    }
}

function renderAnalyticsContent(data) {
    const container = document.getElementById('analytics-content');
    
    // Update hero stats
    const heroPnl = document.getElementById('hero-an-pnl');
    if (heroPnl) {
        const pnl = data.total_pnl_eur || 0;
        heroPnl.textContent = (pnl >= 0 ? '+' : '') + '\u20AC' + pnl.toFixed(2);
        heroPnl.className = 'hero-value ' + (pnl >= 0 ? 'text-success' : 'text-danger');
    }
    const heroWr = document.getElementById('hero-an-winrate');
    if (heroWr) heroWr.textContent = ((data.win_rate || 0) * 100).toFixed(1) + '%';
    const heroTr = document.getElementById('hero-an-trades');
    if (heroTr) heroTr.textContent = data.total_trades || 0;
    const heroPf = document.getElementById('hero-an-pf');
    if (heroPf) heroPf.textContent = (data.profit_factor || 0).toFixed(2);
    
    let html = '';
    
    // Kernstatistieken
    html += `
        <section class="glass-panel">
            <div class="section-header">
                <h2>Kernstatistieken</h2>
            </div>
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Totale Trades</div>
                    <div class="metric-value">${data.total_trades || 0}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Winstpercentage</div>
                    <div class="metric-value positive">${((data.win_rate || 0) * 100).toFixed(1)}%</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Totale W/V</div>
                    <div class="metric-value ${(data.total_pnl_eur || 0) >= 0 ? 'positive' : 'negative'}">
                        €${(data.total_pnl_eur || 0).toFixed(2)}
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Winstfactor</div>
                    <div class="metric-value">${(data.profit_factor || 0).toFixed(2)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Verwachting</div>
                    <div class="metric-value">€${(data.expectancy || 0).toFixed(2)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Gem. Trade Duur</div>
                    <div class="metric-value" style="font-size: 1.2rem;">${formatDuration(data.avg_trade_duration || 0)}</div>
                </div>
            </div>
        </section>
    `;
    
    // Risk Metrics
    html += '<div class="section-divider"></div>';
    html += `
        <section class="glass-panel">
            <div class="section-header">
                <h2>Risico Metrieken</h2>
            </div>
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Max Drawdown</div>
                    <div class="metric-value negative">${((data.max_drawdown || 0) * 100).toFixed(2)}%</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Sharpe Ratio</div>
                    <div class="metric-value">${(data.sharpe_ratio || 0).toFixed(2)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Sortino Ratio</div>
                    <div class="metric-value">${(data.sortino_ratio || 0).toFixed(2)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Calmar Ratio</div>
                    <div class="metric-value">${(data.calmar_ratio || 0).toFixed(2)}</div>
                </div>
            </div>
        </section>
    `;
    
    // Win/Loss Analysis
    html += '<div class="section-divider"></div>';
    html += `
        <section class="glass-panel">
            <div class="section-header">
                <h2>Winst/Verlies Analyse</h2>
            </div>
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Winstgevende Trades</div>
                    <div class="metric-value positive">${data.winning_trades || 0}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Verliesgevende Trades</div>
                    <div class="metric-value negative">${data.losing_trades || 0}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Gem. Winst</div>
                    <div class="metric-value positive">€${(data.avg_win || 0).toFixed(2)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Gem. Verlies</div>
                    <div class="metric-value negative">€${(data.avg_loss || 0).toFixed(2)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Beste Winst</div>
                    <div class="metric-value positive">€${(data.best_win || 0).toFixed(2)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Slechtste Verlies</div>
                    <div class="metric-value negative">€${(data.worst_loss || 0).toFixed(2)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Winstreeks</div>
                    <div class="metric-value">${data.win_streak || 0}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Verliesreeks</div>
                    <div class="metric-value">${data.loss_streak || 0}</div>
                </div>
            </div>
        </section>
    `;
    
    // Best/Worst Markets
    html += '<div class="section-divider"></div>';
    html += `
        <section class="glass-panel">
            <div class="section-header">
                <h2>Beste & Slechtste Markten</h2>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin: 1rem 0;">
                <div>
                    <h4 style="color: var(--neon-green); margin-bottom: 0.5rem;">🏆 Top 5 Beste Presteerders</h4>
                    ${renderTopMarkets(data.best_markets || [])}
                </div>
                <div>
                    <h4 style="color: var(--danger); margin-bottom: 0.5rem;">📉 Top 5 Slechtste Presteerders</h4>
                    ${renderTopMarkets(data.worst_markets || [])}
                </div>
            </div>
        </section>
    `;
    
    // Market Statistics Table
    html += '<div class="section-divider"></div>';
    html += `
        <section class="glass-panel">
            <div class="section-header">
                <h2>Marktstatistieken</h2>
            </div>
            ${renderMarketStatsTable(data.market_stats || [])}
        </section>
    `;
    
    // Daily P/L Chart
    html += '<div class="section-divider"></div>';
    html += `
        <section class="glass-panel">
            <div class="section-header">
                <h2>Dagelijkse W/V Prestaties</h2>
            </div>
            <div class="chart-container">
                <canvas id="daily-pnl-chart"></canvas>
            </div>
        </section>
    `;
    
    // Export Button
    html += '<div class="section-divider"></div>';
    html += `
        <section class="glass-panel">
            <div class="section-header">
                <h2>Data Export</h2>
            </div>
            <button class="btn btn-primary" onclick="exportAnalytics()">📥 Export als JSON</button>
        </section>
    `;
    
    container.innerHTML = html;
    
    // Render daily P/L chart
    renderDailyPnlChart(data.daily_pnl || []);
}

function formatDuration(seconds) {
    const hours = Math.floor(seconds / 3600);
    const minutes = Math.floor((seconds % 3600) / 60);
    if (hours > 24) {
        const days = Math.floor(hours / 24);
        return `${days}d ${hours % 24}h`;
    }
    return `${hours}h ${minutes}m`;
}

function renderTopMarkets(markets) {
    if (!markets || markets.length === 0) {
        return '<p class="info-message">Geen data beschikbaar</p>';
    }
    
    let html = '<table class="stats-table"><tbody>';
    markets.slice(0, 5).forEach((market, idx) => {
        const pnl = market.pnl || market.total_pnl || 0;
        const pnlClass = pnl >= 0 ? 'positive' : 'negative';
        html += `
            <tr>
                <td><strong>${idx + 1}. ${market.market}</strong></td>
                <td class="metric-value ${pnlClass}" style="font-size: 1rem; text-align: right;">€${pnl.toFixed(2)}</td>
            </tr>
        `;
    });
    html += '</tbody></table>';
    return html;
}

function renderMarketStatsTable(marketStats) {
    if (!marketStats || marketStats.length === 0) {
        return '<p class="info-message">Geen marktstatistieken beschikbaar</p>';
    }
    
    let html = `
        <table class="stats-table" id="market-stats-table">
            <thead>
                <tr>
                    <th onclick="sortMarketStats('market')">Markt</th>
                    <th onclick="sortMarketStats('trades')">Trades</th>
                    <th onclick="sortMarketStats('win_rate')">Winstpercentage</th>
                    <th onclick="sortMarketStats('total_pnl')">Totale W/V</th>
                    <th onclick="sortMarketStats('avg_pnl')">Gem. W/V</th>
                    <th onclick="sortMarketStats('best_trade')">Beste Trade</th>
                    <th onclick="sortMarketStats('worst_trade')">Slechtste Trade</th>
                </tr>
            </thead>
            <tbody>
    `;
    
    marketStats.forEach(stat => {
        const pnlClass = (stat.total_pnl || 0) >= 0 ? 'positive' : 'negative';
        html += `
            <tr>
                <td><strong>${stat.market}</strong></td>
                <td>${stat.trades || 0}</td>
                <td>${((stat.win_rate || 0) * 100).toFixed(1)}%</td>
                <td class="${pnlClass}">€${(stat.total_pnl || 0).toFixed(2)}</td>
                <td>€${(stat.avg_pnl || 0).toFixed(2)}</td>
                <td class="positive">€${(stat.best_trade || 0).toFixed(2)}</td>
                <td class="negative">€${(stat.worst_trade || 0).toFixed(2)}</td>
            </tr>
        `;
    });
    
    html += '</tbody></table>';
    return html;
}

let sortColumn = 'total_pnl';
let sortDirection = -1; // -1 = desc, 1 = asc

function sortMarketStats(column) {
    if (sortColumn === column) {
        sortDirection *= -1;
    } else {
        sortColumn = column;
        sortDirection = -1;
    }
    
    analyticsData.market_stats.sort((a, b) => {
        let valA = a[column] || 0;
        let valB = b[column] || 0;
        
        if (typeof valA === 'string') {
            return sortDirection * valA.localeCompare(valB);
        }
        return sortDirection * (valA - valB);
    });
    
    // Only re-render the table, not the entire page (preserves chart)
    const tableSection = document.getElementById('market-stats-table');
    if (tableSection && tableSection.parentElement) {
        tableSection.parentElement.innerHTML = renderMarketStatsTable(analyticsData.market_stats);
    }
}

function renderDailyPnlChart(dailyPnl) {
    if (dailyPnlChart) {
        dailyPnlChart.destroy();
    }
    
    if (!dailyPnl || dailyPnl.length === 0) return;
    
    const ctx = document.getElementById('daily-pnl-chart');
    if (!ctx) return;
    
    // Calculate cumulative P/L
    let cumulative = 0;
    const cumulativePnl = dailyPnl.map(dp => {
        cumulative += dp.pnl || 0;
        return cumulative;
    });
    
    dailyPnlChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: dailyPnl.map(dp => dp.date),
            datasets: [
                {
                    label: 'Cumulatieve W/V (EUR)',
                    data: cumulativePnl,
                    borderColor: '#00d4aa',
                    backgroundColor: 'rgba(0, 212, 170, 0.1)',
                    fill: true,
                    tension: 0.3,
                    borderWidth: 2
                },
                {
                    label: 'Dagelijkse W/V (EUR)',
                    data: dailyPnl.map(dp => dp.pnl || 0),
                    type: 'bar',
                    backgroundColor: dailyPnl.map(dp => (dp.pnl || 0) >= 0 ? 'rgba(0, 212, 170, 0.5)' : 'rgba(255, 107, 107, 0.5)'),
                    borderColor: dailyPnl.map(dp => (dp.pnl || 0) >= 0 ? '#00d4aa' : '#ff6b6b'),
                    borderWidth: 1
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: { color: '#e0e0e0' }
                },
                tooltip: {
                    mode: 'index',
                    intersect: false
                }
            },
            scales: {
                x: {
                    ticks: { color: '#a0a0a0' },
                    grid: { color: 'rgba(255, 255, 255, 0.05)' }
                },
                y: {
                    ticks: { color: '#a0a0a0' },
                    grid: { color: 'rgba(255, 255, 255, 0.1)' }
                }
            }
        }
    });
}

function exportAnalytics() {
    if (!analyticsData) {
        apexToast('Geen analytics data om te exporteren', 'error');
        return;
    }
    
    const dataStr = JSON.stringify(analyticsData, null, 2);
    const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
    
    const exportFileDefaultName = `analytics_${new Date().toISOString().split('T')[0]}.json`;
    
    const linkElement = document.createElement('a');
    linkElement.setAttribute('href', dataUri);
    linkElement.setAttribute('download', exportFileDefaultName);
    linkElement.click();
    
    apexToast('✅ Analytics geëxporteerd!', 'success');
}

// Load data on page load
document.addEventListener('DOMContentLoaded', loadAnalyticsData);

// Auto-refresh every 60 seconds
setInterval(loadAnalyticsData, 60000);
</script>
{% endblock %}
