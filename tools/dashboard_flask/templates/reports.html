{% extends "base.html" %}

{% block title %}📄 Rapporten & Logs - Bitvavo Trading Bot{% endblock %}

{% block content %}

<!-- Hero Stats Grid -->
<div class="hero-grid" id="reports-hero-grid">
    <div class="hero-card">
        <div class="hero-label">🚦 STATUS</div>
        <div class="hero-value" id="hero-rp-status">Laden...</div>
        <div class="hero-sub">Trade blokkade</div>
    </div>
    <div class="hero-card">
        <div class="hero-label">📊 BLOKKADES</div>
        <div class="hero-value" id="hero-rp-blocks">-</div>
        <div class="hero-sub">Recente blokkades</div>
    </div>
    <div class="hero-card">
        <div class="hero-label">📅 RAPPORTEN</div>
        <div class="hero-value" id="hero-rp-count">-</div>
        <div class="hero-sub">Beschikbare rapporten</div>
    </div>
    <div class="hero-card">
        <div class="hero-label">🔄 AUTO-REFRESH</div>
        <div class="hero-value">30s</div>
        <div class="hero-sub">Indicator interval</div>
    </div>
</div>

<!-- Dynamic Content -->
<div id="reports-content">
    <div class="loading-spinner">
        <div class="spinner"></div>
        <p>Diagnostiek laden...</p>
    </div>
</div>

<style>
.status-badge {
    display: inline-block;
    padding: 0.25rem 0.75rem;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 600;
}

.status-badge.status-normal {
    background: rgba(0, 212, 170, 0.2);
    color: #00d4aa;
    border: 1px solid #00d4aa;
}

.status-badge.status-blocked {
    background: rgba(255, 107, 107, 0.2);
    color: #ff6b6b;
    border: 1px solid #ff6b6b;
}

.status-badge.status-warning {
    background: rgba(255, 193, 7, 0.2);
    color: #ffc107;
    border: 1px solid #ffc107;
}

.diagnostics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1rem;
    margin: 1.5rem 0;
}

.diagnostic-card {
    background: rgba(20, 20, 35, 0.6);
    border: 1px solid rgba(0, 212, 170, 0.3);
    border-radius: 8px;
    padding: 1rem;
}

.diagnostic-card h4 {
    margin: 0 0 0.5rem;
    color: var(--neon-blue);
    font-size: 1rem;
}

.diagnostic-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.diagnostic-item:last-child {
    border-bottom: none;
}

.indicators-table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
}

.indicators-table th,
.indicators-table td {
    padding: 0.75rem;
    text-align: left;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.indicators-table th {
    font-weight: 600;
    color: var(--neon-blue);
    font-size: 0.9rem;
}

.indicators-table tbody tr:hover {
    background: rgba(0, 212, 255, 0.05);
}

.report-viewer {
    background: rgba(20, 20, 35, 0.4);
    border: 1px solid rgba(0, 212, 255, 0.2);
    border-radius: 8px;
    padding: 1.5rem;
    margin: 1rem 0;
}

.report-content {
    background: rgba(10, 10, 20, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    padding: 1.5rem;
    max-height: 600px;
    overflow-y: auto;
    font-family: 'Courier New', monospace;
    font-size: 0.9rem;
    line-height: 1.6;
    white-space: pre-wrap;
}

.section-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.3), transparent);
    margin: 2.5rem 0;
}

/* Responsive */
@media (max-width: 1200px) {
    .diagnostics-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
    .diagnostics-grid { grid-template-columns: 1fr; }
}
</style>

<script>
let reportsData = null;
let indicatorsInterval = null;

async function loadReportsData() {
    try {
        // Load trade blocks diagnostics
        const diagnosticsResponse = await fetch('/api/trade_blocks/diagnostics');
        if (!diagnosticsResponse.ok) throw new Error('Failed to fetch diagnostics');
        const diagnosticsData = await diagnosticsResponse.json();
        
        // Load indicators
        const indicatorsResponse = await fetch('/api/trade_blocks/indicators');
        if (!indicatorsResponse.ok) throw new Error('Failed to fetch indicators');
        const indicatorsData = await indicatorsResponse.json();
        
        // Load reports list
        const reportsResponse = await fetch('/api/reports/list');
        if (!reportsResponse.ok) throw new Error('Failed to fetch reports');
        const reportsListData = await reportsResponse.json();
        
        reportsData = {
            diagnostics: diagnosticsData,
            indicators: indicatorsData,
            reports_list: reportsListData.reports || []
        };
        
        renderReportsContent(reportsData);
    } catch (error) {
        console.error('Error loading reports:', error);
        document.getElementById('reports-content').innerHTML = `
            <div class="glass-panel">
                <div style="text-align: center; padding: 2rem; color: var(--danger);">
                    <h3>⚠️ Kon diagnostics niet laden</h3>
                    <p>${error.message}</p>
                    <button class="btn btn-secondary" onclick="loadReportsData()">🔄 Opnieuw proberen</button>
                </div>
            </div>
        `;
    }
}

function renderReportsContent(data) {
    const container = document.getElementById('reports-content');
    
    // Update hero stats
    const heroStatus = document.getElementById('hero-rp-status');
    if (heroStatus) {
        const status = (data.diagnostics.status || 'unknown').toUpperCase();
        heroStatus.textContent = status;
        heroStatus.className = 'hero-value ' + (status === 'NORMAL' ? 'text-success' : status === 'BLOCKED' ? 'text-danger' : 'text-warning');
    }
    const heroBlocks = document.getElementById('hero-rp-blocks');
    if (heroBlocks) {
        const entries = data.indicators.latest_entries || [];
        heroBlocks.textContent = entries.length;
    }
    const heroCount = document.getElementById('hero-rp-count');
    if (heroCount) heroCount.textContent = (data.reports_list || []).length;
    
    let html = '';
    
    // Trade Blokkade Diagnostiek
    html += `
        <section class="glass-panel">
            <div class="section-header">
                <h2>🚦 Trade Blokkade Diagnostiek</h2>
            </div>
    `;
    
    const diag = data.diagnostics;
    const status = diag.status || 'unknown';
    const statusClass = status === 'normal' ? 'status-normal' : (status === 'blocked' ? 'status-blocked' : 'status-warning');
    
    html += `
        <div style="margin-bottom: 1.5rem;">
            <strong>Status:</strong> <span class="status-badge ${statusClass}">${status.toUpperCase()}</span>
        </div>
    `;
    
    html += '<div class="diagnostics-grid">';
    
    // Blocking Factors
    html += `
        <div class="diagnostic-card">
            <h4>🚫 Blocking Factors</h4>
    `;
    if (diag.blocking_factors && diag.blocking_factors.length > 0) {
        diag.blocking_factors.forEach(factor => {
            html += `<div class="diagnostic-item"><span>${factor}</span></div>`;
        });
    } else {
        html += '<p class="info-message">Geen blokkades</p>';
    }
    html += '</div>';
    
    // Config Analysis
    html += `
        <div class="diagnostic-card">
            <h4>⚙️ Config Analysis</h4>
    `;
    if (diag.config_analysis) {
        Object.entries(diag.config_analysis).forEach(([key, value]) => {
            html += `
                <div class="diagnostic-item">
                    <span>${key}</span>
                    <span style="color: var(--neon-cyan);">${value}</span>
                </div>
            `;
        });
    } else {
        html += '<p class="info-message">Geen config data</p>';
    }
    html += '</div>';
    
    // Balance Analysis
    html += `
        <div class="diagnostic-card">
            <h4>💰 Balance Analysis</h4>
    `;
    if (diag.balance_analysis) {
        Object.entries(diag.balance_analysis).forEach(([key, value]) => {
            html += `
                <div class="diagnostic-item">
                    <span>${key}</span>
                    <span style="color: var(--neon-cyan);">${value}</span>
                </div>
            `;
        });
    } else {
        html += '<p class="info-message">Geen balance data</p>';
    }
    html += '</div>';
    
    // Scan Status
    html += `
        <div class="diagnostic-card">
            <h4>🔍 Scan Status</h4>
    `;
    if (diag.scan_status) {
        Object.entries(diag.scan_status).forEach(([key, value]) => {
            html += `
                <div class="diagnostic-item">
                    <span>${key}</span>
                    <span style="color: var(--neon-cyan);">${value}</span>
                </div>
            `;
        });
    } else {
        html += '<p class="info-message">Geen scan data</p>';
    }
    html += '</div>';
    
    html += '</div>'; // End diagnostics-grid
    html += '</section>';
    
    // Trade Block Indicators (Auto-refresh)
    html += '<div class="section-divider"></div>';
    html += `
        <section class="glass-panel">
            <div class="section-header">
                <h2>📊 Trade Block Indicators</h2>
                <span style="color: var(--text-muted); font-size: 0.85rem;">Auto-refresh elke 30s</span>
            </div>
            <div id="indicators-container">
                ${renderIndicators(data.indicators)}
            </div>
        </section>
    `;
    
    // Daily Reports Viewer
    html += '<div class="section-divider"></div>';
    html += `
        <section class="glass-panel">
            <div class="section-header">
                <h2>📅 Daily Reports</h2>
            </div>
            <div class="form-group-hodl">
                <label>Selecteer rapport</label>
                <select id="report-selector" class="form-input" onchange="loadSelectedReport()">
                    <option value="">-- Selecteer een rapport --</option>
    `;
    
    data.reports_list.forEach(report => {
        html += `<option value="${report.filename}">${report.filename} (${report.timestamp})</option>`;
    });
    
    html += `
                </select>
            </div>
            <div id="report-viewer-container"></div>
        </section>
    `;
    
    container.innerHTML = html;
    
    // Start auto-refresh for indicators (reduced from 5s to 30s for performance)
    if (indicatorsInterval) clearInterval(indicatorsInterval);
    indicatorsInterval = setInterval(refreshIndicators, 30000);
}

function renderIndicators(indicatorsData) {
    let html = '';
    
    // Latest entries
    if (indicatorsData.latest_entries && indicatorsData.latest_entries.length > 0) {
        html += '<h4 style="margin: 1rem 0 0.5rem;">Recent Block Events</h4>';
        html += `
            <table class="indicators-table">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Market</th>
                        <th>Reason</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        indicatorsData.latest_entries.slice(0, 20).forEach(entry => {
            html += `
                <tr>
                    <td>${entry.timestamp || 'N/A'}</td>
                    <td><strong>${entry.market || 'N/A'}</strong></td>
                    <td>${entry.reason || 'N/A'}</td>
                    <td style="font-size: 0.85rem;"><code style="background:var(--bg-tertiary,#1e293b);padding:2px 6px;border-radius:4px;font-size:0.8rem;">${escapeHtml(JSON.stringify(entry.details || {})).substring(0, 120)}${JSON.stringify(entry.details || {}).length > 120 ? '...' : ''}</code></td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
    } else {
        html += '<p class="info-message">Geen recente block events</p>';
    }
    
    // Summary by market
    if (indicatorsData.summary_by_market && Object.keys(indicatorsData.summary_by_market).length > 0) {
        html += '<h4 style="margin: 1.5rem 0 0.5rem;">Summary by Market</h4>';
        html += `
            <table class="indicators-table">
                <thead>
                    <tr>
                        <th>Market</th>
                        <th>Total Blocks</th>
                        <th>Most Common Reason</th>
                        <th>Count</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        Object.entries(indicatorsData.summary_by_market).forEach(([market, summary]) => {
            html += `
                <tr>
                    <td><strong>${market}</strong></td>
                    <td>${summary.total || 0}</td>
                    <td>${summary.most_common_reason || 'N/A'}</td>
                    <td>${summary.most_common_count || 0}</td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
    }
    
    return html;
}

async function refreshIndicators() {
    try {
        const response = await fetch('/api/trade_blocks/indicators');
        if (!response.ok) return;
        
        const indicatorsData = await response.json();
        reportsData.indicators = indicatorsData;
        
        const container = document.getElementById('indicators-container');
        if (container) {
            container.innerHTML = renderIndicators(indicatorsData);
        }
    } catch (error) {
        console.error('Error refreshing indicators:', error);
    }
}

async function loadSelectedReport() {
    const selector = document.getElementById('report-selector');
    const filename = selector.value;
    
    if (!filename) {
        document.getElementById('report-viewer-container').innerHTML = '';
        return;
    }
    
    try {
        const response = await fetch(`/api/reports/get/${filename}`);
        if (!response.ok) throw new Error('Failed to load report');
        
        const reportData = await response.json();
        renderReportViewer(reportData);
    } catch (error) {
        console.error('Error loading report:', error);
        apexToast('❌ Kon rapport niet laden', 'error');
    }
}

function renderReportViewer(reportData) {
    const container = document.getElementById('report-viewer-container');
    
    let html = '<div class="report-viewer">';
    
    // Markdown content - basic rendering
    if (reportData.markdown_content) {
        html += '<h4 style="margin: 0 0 1rem;">📄 Markdown Rapport</h4>';
        // Convert markdown to HTML (basic renderer)
        let md = escapeHtml(reportData.markdown_content);
        md = md.replace(/^### (.+)$/gm, '<h3>$1</h3>');
        md = md.replace(/^## (.+)$/gm, '<h2 style="margin-top:1rem;">$1</h2>');
        md = md.replace(/^# (.+)$/gm, '<h1>$1</h1>');
        md = md.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        md = md.replace(/\*(.+?)\*/g, '<em>$1</em>');
        md = md.replace(/`([^`]+)`/g, '<code style="background:var(--bg-tertiary,#1e293b);padding:2px 6px;border-radius:4px;">$1</code>');
        md = md.replace(/^- (.+)$/gm, '<li>$1</li>');
        md = md.replace(/(<li>.+<\/li>)/s, '<ul>$1</ul>');
        md = md.replace(/\n\n/g, '<br><br>');
        md = md.replace(/\n/g, '<br>');
        html += `<div class="report-content" style="line-height:1.7;">${md}</div>`;
    }
    
    // JSON data (recommendations) - formatted
    if (reportData.json_data) {
        html += '<h4 style="margin: 1.5rem 0 1rem;">💡 Recommendations (JSON)</h4>';
        html += `<pre class="report-content" style="background:var(--bg-tertiary,#1e293b);padding:1rem;border-radius:8px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:0.85rem;line-height:1.5;white-space:pre-wrap;">${escapeHtml(JSON.stringify(reportData.json_data, null, 2))}</pre>`;
        
        html += `
            <button class="btn btn-primary" style="margin-top: 1rem;" onclick="downloadReportJSON()">
                📥 Download JSON
            </button>
        `;
    }
    
    html += '</div>';
    container.innerHTML = html;
}

function downloadReportJSON() {
    const selector = document.getElementById('report-selector');
    const filename = selector.value;
    
    if (!filename) return;
    
    fetch(`/api/reports/get/${filename}`)
        .then(response => response.json())
        .then(reportData => {
            if (!reportData.json_data) {
                apexToast('Geen JSON data beschikbaar', 'error');
                return;
            }
            
            const dataStr = JSON.stringify(reportData.json_data, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', filename.replace('.md', '.json'));
            linkElement.click();
            
            apexToast('✅ JSON gedownload!', 'success');
        })
        .catch(error => {
            console.error('Error downloading JSON:', error);
            apexToast('❌ Download mislukt', 'error');
        });
}

// Load data on page load
document.addEventListener('DOMContentLoaded', loadReportsData);

// Cleanup interval on page unload
window.addEventListener('beforeunload', () => {
    if (indicatorsInterval) clearInterval(indicatorsInterval);
});
</script>
{% endblock %}
