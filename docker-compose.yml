# Docker Compose configuration for Bitvavo Trading Bot
version: '3.8'

services:
  # Main trading bot
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
        VERSION: ${VERSION:-latest}
    container_name: bitvavo-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FLASK_ENV=production
    volumes:
      # Persistent data
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./metrics:/app/metrics
      - ./reports:/app/reports
      # Configuration (read-only)
      - ./config:/app/config:ro
    ports:
      - "${DASHBOARD_PORT:-5001}:5001"
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Prometheus for metrics (uncomment to enable)
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: bitvavo-prometheus
  #   restart: unless-stopped
  #   volumes:
  #     - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - prometheus-data:/prometheus
  #   ports:
  #     - "9090:9090"
  #   networks:
  #     - bot-network
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #     - '--storage.tsdb.path=/prometheus'

  # Optional: Grafana for dashboards (uncomment to enable)
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: bitvavo-grafana
  #   restart: unless-stopped
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
  #     - GF_SERVER_ROOT_URL=http://localhost:3000
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #     - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - bot-network
  #   depends_on:
  #     - prometheus

networks:
  bot-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
