# Pre-commit hooks configuration for Bitvavo Trading Bot
# Install with: pip install pre-commit && pre-commit install

repos:
  # Code formatting with Black
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.13
        args: ['--line-length=120']
        exclude: ^(archive/|backups/|\.venv/)

  # Import sorting with isort
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile=black', '--line-length=120']
        exclude: ^(archive/|backups/|\.venv/)

  # Linting with flake8
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: [
          '--max-line-length=120',
          '--extend-ignore=E203,E501,W503',
          '--exclude=archive,backups,.venv,__pycache__'
        ]

  # Type checking with mypy (optional, may need config)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: ['types-requests']
        args: ['--ignore-missing-imports', '--no-strict-optional']
        exclude: ^(archive/|backups/|tests/|\.venv/)

  # Security checks with bandit
  - repo: https://github.com/pycqa/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml', '--skip=B101']
        additional_dependencies: ['bandit[toml]']
        exclude: ^(tests/|archive/|backups/)

  # General pre-commit checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(archive/|backups/)
      - id: end-of-file-fixer
        exclude: ^(archive/|backups/)
      - id: check-yaml
      - id: check-json
        exclude: ^(archive/|backups/)
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

# Configuration
default_language_version:
  python: python3.13
